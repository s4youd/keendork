<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Keen-Dork · Bug Bounty Edition</title>
<link rel="icon" type="image/jpeg" href="https://pbs.twimg.com/profile_images/2048606878977179648/JyJA2_52_400x400.jpg" />
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0d0f13;
    --surface: #13161c;
    --surface2: #191d25;
    --border: #252a35;
    --border2: #2e3440;
    --text: #c9cdd6;
    --text-dim: #6b7685;
    --text-bright: #e8eaf0;
    --accent: #f7a154;
    --accent2: #e08a3a;
    --red: #ef4444;
    --orange: #f97316;
    --yellow: #f7a154;
    --blue: #60a5fa;
    --gray: #6b7685;
    --green: #34d399;
    --mono: 'JetBrains Mono', 'Fira Code', monospace;
    --sans: 'IBM Plex Sans', system-ui, sans-serif;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }

  a { text-decoration: none; color: inherit; }
  h1,h2,h3 { font-weight: 700; }

  /* ─── LAYOUT ─── */
  .app {
    max-width: 1480px;
    margin: 0 auto;
    padding: 1.6rem 2rem 4rem;
  }

  /* ─── HEADER ─── */
  .header {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin-bottom: 1.6rem;
    flex-wrap: wrap;
    border-bottom: 1px solid var(--border);
    padding-bottom: 1.2rem;
  }
  .header img {
    height: 46px; width: 46px;
    border-radius: 10px; object-fit: cover;
    border: 1px solid var(--border2);
  }
  .header h1 {
    font-size: 1.7rem; font-family: var(--mono);
    color: var(--text-bright); letter-spacing: -1px;
  }
  .header h1 span { color: var(--accent); }
  .header .meta {
    margin-left: auto; font-size: 0.8rem; color: var(--text-dim);
    display: flex; gap: 0.8rem; align-items: center; flex-wrap: wrap;
  }
  .header .meta a { color: var(--accent); font-weight: 600; }
  .pill {
    background: #1e2230; border: 1px solid var(--border2);
    border-radius: 999px; padding: 0.2rem 0.7rem;
    font-size: 0.72rem; font-weight: 600; color: var(--text-dim);
    letter-spacing: 0.4px; text-transform: uppercase;
  }
  .pill.live { border-color: #34d39960; color: var(--green); background: #0a2318; }

  /* ─── CONTROLS STRIP ─── */
  .controls {
    display: flex;
    gap: 0.8rem;
    margin-bottom: 1.4rem;
    flex-wrap: wrap;
    align-items: stretch;
  }
  .target-wrap {
    flex: 1; min-width: 260px;
    display: flex; align-items: center;
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 10px;
    padding: 0 0.5rem 0 1rem;
    gap: 0.6rem;
  }
  .target-wrap label {
    font-family: var(--mono); font-size: 0.78rem;
    color: var(--accent); white-space: nowrap; font-weight: 700;
  }
  .target-wrap input {
    flex: 1; background: none; border: none;
    padding: 0.75rem 0.4rem; font-size: 0.95rem;
    color: var(--text-bright); outline: none;
    font-family: var(--mono);
    min-width: 0;
  }
  .target-wrap input::placeholder { color: var(--text-dim); }
  .btn-apply {
    background: var(--accent); color: #0d0f13;
    border: none; border-radius: 8px;
    padding: 0.6rem 1.4rem; font-weight: 700; font-size: 0.88rem;
    cursor: pointer; white-space: nowrap; font-family: var(--sans);
    letter-spacing: 0.2px;
  }
  .btn-apply:hover { background: var(--accent2); }

  .filter-wrap {
    min-width: 200px; flex: 0 0 auto;
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 10px;
    display: flex; align-items: center;
    padding: 0 0.8rem; gap: 0.5rem;
  }
  .filter-wrap svg { color: var(--text-dim); flex-shrink: 0; }
  .filter-wrap input {
    background: none; border: none;
    padding: 0.75rem 0.2rem; font-size: 0.88rem;
    color: var(--text-bright); outline: none;
    width: 160px; font-family: var(--sans);
  }
  .filter-wrap input::placeholder { color: var(--text-dim); }

  .sev-filter {
    display: flex; gap: 0.4rem; flex-wrap: wrap; align-items: center;
  }
  .sev-btn {
    padding: 0.4rem 0.9rem; border-radius: 7px;
    font-size: 0.75rem; font-weight: 700; cursor: pointer;
    border: 1px solid transparent; letter-spacing: 0.3px;
    text-transform: uppercase; font-family: var(--sans);
    transition: opacity 0.15s;
  }
  .sev-btn.all { background: #252a35; color: var(--text); border-color: var(--border2); }
  .sev-btn.critical { background: #2a1212; color: #ef4444; border-color: #3d1515; }
  .sev-btn.high     { background: #2a1a0a; color: #f97316; border-color: #3d2510; }
  .sev-btn.medium   { background: #2a2010; color: #f7a154; border-color: #3d300f; }
  .sev-btn.low      { background: #0e1e3a; color: #60a5fa; border-color: #14285a; }
  .sev-btn.info     { background: #18202c; color: #8b949e; border-color: #252d3a; }
  .sev-btn.active   { opacity: 1; }
  .sev-btn:not(.active) { opacity: 0.4; }

  /* ─── STATS STRIP ─── */
  .stats-strip {
    display: flex; gap: 1rem; margin-bottom: 1.6rem; flex-wrap: wrap;
  }
  .stat-box {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 0.6rem 1rem;
    font-size: 0.78rem; color: var(--text-dim);
    display: flex; align-items: center; gap: 0.4rem;
  }
  .stat-box strong { color: var(--text-bright); font-size: 0.88rem; }

  /* ─── QUICK ACCESS ─── */
  .quick-row {
    display: flex; gap: 0.5rem; flex-wrap: wrap;
    margin-bottom: 2rem;
  }
  .quick-row a {
    display: inline-flex; align-items: center; gap: 0.4rem;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 7px; padding: 0.4rem 0.9rem;
    font-size: 0.78rem; font-weight: 600; color: var(--text-dim);
    transition: border-color 0.15s, color 0.15s;
  }
  .quick-row a:hover { border-color: var(--accent); color: var(--accent); }

  /* ─── SECTION HEADING ─── */
  .sev-section { margin-bottom: 0.4rem; }
  .sev-head {
    display: flex; align-items: center; gap: 0.6rem;
    margin: 2rem 0 0.9rem;
    padding-bottom: 0.55rem;
    border-bottom: 1px solid var(--border);
  }
  .sev-dot {
    width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0;
  }
  .sev-head h2 {
    font-size: 1rem; font-family: var(--mono); font-weight: 700;
    letter-spacing: -0.2px;
  }
  .sev-count {
    margin-left: auto; background: var(--surface2);
    border: 1px solid var(--border); border-radius: 5px;
    padding: 0.15rem 0.5rem; font-size: 0.7rem;
    font-family: var(--mono); color: var(--text-dim);
  }
  .dot-critical { background: #ef4444; }
  .dot-high     { background: #f97316; }
  .dot-medium   { background: #f7a154; }
  .dot-low      { background: #60a5fa; }
  .dot-info     { background: #6b7685; }
  .col-critical { color: #ef4444; }
  .col-high     { color: #f97316; }
  .col-medium   { color: #f7a154; }
  .col-low      { color: #60a5fa; }
  .col-info     { color: #6b7685; }

  /* ─── DORK GRID ─── */
  .dork-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
    gap: 0.8rem;
  }

  /* ─── DORK CARD ─── */
  .dork-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1rem 1.1rem;
    display: flex; flex-direction: column; gap: 0.55rem;
    cursor: pointer; position: relative; overflow: hidden;
  }
  .dork-card:hover {
    border-color: var(--accent);
    background: var(--surface2);
  }
  .dork-card:hover .copy-btn { opacity: 1; }

  .dork-title {
    display: flex; align-items: center; gap: 0.5rem;
    font-weight: 600; font-size: 0.88rem; color: var(--text-bright);
  }
  .dork-icon {
    width: 28px; height: 28px; border-radius: 6px;
    background: var(--surface2); display: flex;
    align-items: center; justify-content: center;
    font-size: 0.9rem; flex-shrink: 0;
  }
  .dork-query {
    font-family: var(--mono); font-size: 0.7rem; color: var(--text-dim);
    word-break: break-all; line-height: 1.55;
    max-height: 52px; overflow: hidden; position: relative;
  }
  .dork-query::after {
    content: ''; position: absolute; bottom: 0; left: 0;
    right: 0; height: 20px;
    background: linear-gradient(transparent, var(--surface));
    pointer-events: none;
  }
  .dork-card:hover .dork-query::after {
    background: linear-gradient(transparent, var(--surface2));
  }

  .dork-footer {
    display: flex; align-items: center; gap: 0.4rem; flex-wrap: wrap;
    margin-top: 0.1rem;
  }
  .badge {
    font-size: 0.62rem; font-weight: 700; padding: 0.18rem 0.55rem;
    border-radius: 4px; letter-spacing: 0.4px; text-transform: uppercase;
    font-family: var(--mono);
  }
  .bg-google  { background: #0e1f3a; color: #8ab4f8; }
  .bg-github  { background: #0e2018; color: #7ee787; }
  .bg-shodan  { background: #2a0e0e; color: #f77878; }
  .bg-wayback { background: #261b0a; color: #f7a154; }
  .bg-crtsh   { background: #101826; color: #93b4d4; }
  .bg-censys  { background: #0e1e2a; color: #60a5fa; }
  .bg-urlscan { background: #1e0e2a; color: #c084fc; }
  .bg-fofa    { background: #0e2020; color: #34d399; }
  .bg-grep    { background: #1a1220; color: #e879f9; }
  .bg-intx    { background: #201010; color: #fb923c; }

  .copy-btn {
    margin-left: auto; opacity: 0;
    background: none; border: 1px solid var(--border2);
    border-radius: 5px; padding: 0.2rem 0.5rem;
    cursor: pointer; color: var(--text-dim); font-size: 0.65rem;
    font-family: var(--mono); font-weight: 600;
    transition: opacity 0.15s, color 0.15s;
    flex-shrink: 0;
  }
  .copy-btn:hover { color: var(--accent); border-color: var(--accent); }
  .copy-btn.copied { color: var(--green); border-color: var(--green); opacity: 1; }

  /* ─── HIDDEN ─── */
  .hidden { display: none !important; }

  /* ─── FOOTER ─── */
  .footer {
    text-align: center; margin-top: 3rem; padding-top: 1.5rem;
    border-top: 1px solid var(--border);
    color: var(--text-dim); font-size: 0.78rem;
  }
  .footer a { color: var(--accent); font-weight: 600; }

  /* ─── RESPONSIVE ─── */
  @media (max-width: 768px) {
    .app { padding: 1rem 1rem 3rem; }
    .header h1 { font-size: 1.3rem; }
    .controls { flex-direction: column; }
    .filter-wrap input { width: 100%; }
    .dork-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="app">

  <!-- HEADER -->
  <div class="header">
    <img src="https://pbs.twimg.com/profile_images/2048606878977179648/JyJA2_52_400x400.jpg" alt="logo" />
    <h1>Keen<span>Dork</span></h1>
    <span class="pill">Bug Bounty Edition</span>
    <span class="pill live">● Community Dorks</span>
    <div class="meta">
      crafted by <a href="https://github.com/keen-i" target="_blank">keen-i</a>
      &nbsp;·&nbsp; use only on authorized targets
    </div>
  </div>

  <!-- CONTROLS -->
  <div class="controls">
    <div class="target-wrap">
      <label>TARGET►</label>
      <input type="text" id="targetDomain" placeholder="example.com" value="" />
      <button class="btn-apply" id="applyBtn">Apply Dorks</button>
    </div>
    <div class="filter-wrap">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" id="filterInput" placeholder="Filter dorks…" />
    </div>
  </div>

  <div class="sev-filter" id="sevFilter">
    <button class="sev-btn all active" data-sev="all">All</button>
    <button class="sev-btn critical active" data-sev="critical">Critical</button>
    <button class="sev-btn high active" data-sev="high">High</button>
    <button class="sev-btn medium active" data-sev="medium">Medium</button>
    <button class="sev-btn low active" data-sev="low">Low</button>
    <button class="sev-btn info active" data-sev="info">Info / Recon</button>
  </div>

  <!-- STATS -->
  <div class="stats-strip" id="statsStrip"></div>

  <!-- QUICK ACCESS -->
  <div class="quick-row" id="quickRow"></div>

  <!-- DORKS CONTAINER -->
  <div id="dorksContainer"></div>

  <!-- FOOTER -->
  <div class="footer">
    ⚡ <strong>Keen-Dork Bug Bounty Edition</strong> —
    dorks sourced from GHDB, HackerOne reports, community write-ups, NahamSec, TCM, Jason Haddix methodologies.
    Use responsibly. <a href="https://github.com/keen-i" target="_blank">keen-i</a>
  </div>
</div>

<script>
(function () {

  /* ─── HELPERS ─── */
  const $ = id => document.getElementById(id);
  const esc = encodeURIComponent;

  function sanitize(raw) {
    if (!raw) return 'target.com';
    return raw.replace(/^https?:\/\//i,'').replace(/\/.*$/,'').replace(/[^a-zA-Z0-9.\-_]/g,'') || 'target.com';
  }

  /* ─── DORK DATABASE ─── */
  const DORKS = {

    /* ══════════════════════════════ CRITICAL ══════════════════════════════ */
    critical: [
      {
        title: '.env Files with Secrets',
        icon: '⚙️',
        platforms: ['google'],
        query: 'site:{T} (ext:env | inurl:".env.production" | inurl:".env.local" | inurl:".env.backup" | inurl:".env.bak" | inurl:".env~" | inurl:".env.old" | inurl:".env.dev" | inurl:".env.staging" | inurl:".env.test") (intext:"DB_PASSWORD" | intext:"SECRET_KEY" | intext:"API_KEY" | intext:"APP_SECRET" | intext:"AWS_ACCESS_KEY_ID" | intext:"JWT_SECRET" | intext:"REDIS_PASSWORD" | intext:"MONGODB_URI" | intext:"PRIVATE_KEY")'
      },
      {
        title: 'AWS / GCP / Azure Cloud Credentials',
        icon: '☁️',
        platforms: ['google'],
        query: 'site:{T} (ext:env | ext:yml | ext:json | ext:ini | ext:cfg | ext:conf) ("AKIA" | "aws_secret_access_key" | "AWS_SESSION_TOKEN" | "AZURE_CLIENT_SECRET" | "AZURE_STORAGE_KEY" | "AIzaSy" | "private_key_id" | "google_application_credentials")'
      },
      {
        title: 'Private Keys & Certificates Exposed',
        icon: '🔐',
        platforms: ['google'],
        query: 'site:{T} ("-----BEGIN RSA PRIVATE KEY-----" | "-----BEGIN OPENSSH PRIVATE KEY-----" | "-----BEGIN EC PRIVATE KEY-----" | "-----BEGIN PGP PRIVATE KEY BLOCK-----" | "-----BEGIN PRIVATE KEY-----" | ext:pem | ext:key "PRIVATE" | inurl:"/id_rsa" | inurl:"/server.key")'
      },
      {
        title: 'Service API Keys (Slack, Stripe, Twilio, SendGrid…)',
        icon: '🔑',
        platforms: ['google'],
        query: 'site:{T} ("xoxb-" | "xoxa-" | "xoxp-" | "sk_live_" | "rk_live_" | "TWILIO_AUTH_TOKEN" | "SG." "sendgrid" | "ghp_" | "ghs_" | "glpat-" | "OPENAI_API_KEY" | "sk-proj-" | "shopify_access_token" | "PAYPAL_SECRET" | "ALGOLIA_ADMIN_KEY" | "DISCORD_TOKEN" | "TELEGRAM_BOT_TOKEN" | "FIREBASE_SERVER_KEY")'
      },
      {
        title: 'Hardcoded Credentials in Source Code',
        icon: '👨‍💻',
        platforms: ['google'],
        query: 'site:{T} (ext:php | ext:py | ext:rb | ext:js | ext:java | ext:go | ext:ts) ("password =" | "passwd =" | "secret =" | "api_key =" | "Authorization: Bearer" | "x-api-key:" | "client_secret" | "access_token" | "auth_token")'
      },
      {
        title: 'Database Connection Strings',
        icon: '🗄️',
        platforms: ['google'],
        query: 'site:{T} ("jdbc:mysql://" | "jdbc:postgresql://" | "jdbc:sqlserver://" | "mongodb+srv://" "password" | "redis://:password@" | "mysql://root:" | "postgresql://postgres:" | "mssql://sa:" | "amqp://guest:")'
      },
      {
        title: 'Config Backups (wp-config, settings.py, web.config)',
        icon: '🧩',
        platforms: ['google'],
        query: 'site:{T} (inurl:"wp-config.php.bak" | inurl:"wp-config.php~" | inurl:"wp-config.php.old" | inurl:"settings.py" "SECRET_KEY" | inurl:"application.yml" "password" | inurl:"database.yml" | inurl:"config.php" "password" | inurl:"parameters.yml" "password" | inurl:"secrets.yml" | inurl:"credentials.json" | inurl:".htpasswd")'
      },
      {
        title: 'Pastebin / Gist Credential Leaks',
        icon: '📋',
        platforms: ['google'],
        query: 'site:pastebin.com "{T}" ("password" | "secret" | "api_key" | "BEGIN RSA PRIVATE KEY" | "DB_PASSWORD") | site:gist.github.com "{T}" ("password" | "secret" | "api_key" | "token") | site:paste.ee "{T}" | site:ghostbin.co "{T}"'
      },
      {
        title: 'PII Leaks (CSV / XLS / SQL dumps)',
        icon: '📊',
        platforms: ['google'],
        query: 'site:{T} (filetype:csv | filetype:xls | filetype:xlsx | filetype:sql | filetype:dump) ("email" "password" | "ssn" | "social_security" | "credit_card" | "card_number" | "INSERT INTO users" | "INSERT INTO accounts")'
      },
      {
        title: 'Slack Webhook / Internal Token Leaks',
        icon: '💬',
        platforms: ['google'],
        query: 'site:{T} ("hooks.slack.com/services" | "T[A-Z0-9]{8}/B[A-Z0-9]{8}/[a-zA-Z0-9]{24}" | "xoxp-" | "xoxb-" | "xoxa-" | "xoxs-") | site:github.com "{T}" "hooks.slack.com"'
      },
      {
        title: 'Firebase / NoSQL Exposed DB',
        icon: '🔥',
        platforms: ['google'],
        query: 'site:{T} (inurl:"firebaseio.com/.json" | inurl:".firebaseio.com" ".json" | inurl:"firebase.google.com" "database" | inurl:"/database.rules.json") | site:firebaseio.com "{T}"'
      },
      {
        title: 'Source Maps Exposed (.map files)',
        icon: '🗺️',
        platforms: ['google'],
        query: 'site:{T} (ext:js.map | ext:css.map | inurl:".min.js.map" | inurl:"main.chunk.js.map" | inurl:"bundle.js.map" | inurl:"app.js.map")'
      },
      {
        title: 'JWT / OAuth Secrets in Code',
        icon: '🪙',
        platforms: ['google'],
        query: 'site:{T} (ext:js | ext:ts | ext:py | ext:rb | ext:go) ("jwt_secret" | "JWT_SECRET" | "jwt.sign" | "HS256" | "RS256" | "client_secret" | "oauth_secret" | "token_secret" | "REFRESH_TOKEN_SECRET")'
      },
    ],

    /* ══════════════════════════════ HIGH ══════════════════════════════ */
    high: [
      {
        title: 'SQL Dumps & Database Backups',
        icon: '🗃️',
        platforms: ['google'],
        query: 'site:{T} (ext:sql | ext:dump | intitle:"index of" ".sql" | intitle:"index of" ".dump" | inurl:"/backup" intitle:"index of" | inurl:"/db_backup" | "backup" ext:zip "database" | inurl:"mysqldump" | inurl:"database.sql")'
      },
      {
        title: 'Admin & Management Panels',
        icon: '🛡️',
        platforms: ['google'],
        query: 'site:{T} (inurl:"/admin" | inurl:"/administrator" | inurl:"/admin-panel" | inurl:"/manage" | inurl:"/wp-admin" | inurl:"/cpanel" | inurl:"/webmail" | inurl:"/plesk" | inurl:"/directadmin" | intitle:"phpMyAdmin" | inurl:"/adminer.php" | inurl:"/phpmyadmin" | intitle:"admin dashboard")'
      },
      {
        title: 'DevOps Panels (Jenkins, Kibana, Grafana, Portainer…)',
        icon: '👷',
        platforms: ['google'],
        query: 'site:{T} (intitle:"Jenkins" "Build History" | intitle:"Kibana" "Discover" | inurl:":3000" intitle:"Grafana" | inurl:":9200" "Elasticsearch" | intitle:"Portainer" | intitle:"Traefik" "Dashboard" | inurl:"/sonarqube" | inurl:"/zabbix" | inurl:"/nagios" | intitle:"Rancher" | intitle:"ArgoCD")'
      },
      {
        title: 'Exposed .git / .svn / Version Control',
        icon: '🔀',
        platforms: ['google'],
        query: 'site:{T} (inurl:"/.git/HEAD" | inurl:"/.git/config" | intitle:"index of" "/.git" | inurl:"/.svn/entries" | intitle:"index of" ".svn" | inurl:"/.hg/hgrc" | inurl:"/CVS/Root" | inurl:"/.bzr/README")'
      },
      {
        title: 'Cloud Storage Misconfigs (S3, Azure Blob, GCS)',
        icon: '🪣',
        platforms: ['google'],
        query: 'site:s3.amazonaws.com "{T}" | site:blob.core.windows.net "{T}" | site:storage.googleapis.com "{T}" | site:digitaloceanspaces.com "{T}" | site:firebasestorage.googleapis.com "{T}" | site:*.s3.amazonaws.com | site:*.s3-website*.amazonaws.com "{T}"'
      },
      {
        title: 'phpinfo() & Server Status Pages',

  /* ─── RENDER STATE ─── */
  let currentTarget = '';
  let activeSevs = new Set(['critical','high','medium','low','info']);
  let filterText = '';

  /* ─── SEV CONFIG ─── */
  const SEV_ORDER = ['critical','high','medium','low','info'];
  const SEV_LABEL = { critical:'Critical', high:'High', medium:'Medium', low:'Low', info:'Info / Recon' };
  const SEV_DOT   = { critical:'dot-critical', high:'dot-high', medium:'dot-medium', low:'dot-low', info:'dot-info' };
  const SEV_COL   = { critical:'col-critical', high:'col-high', medium:'col-medium', low:'col-low', info:'col-info' };

  const BADGE_CLASS = {
    google:'bg-google', github:'bg-github', shodan:'bg-shodan',
    wayback:'bg-wayback', crtsh:'bg-crtsh', censys:'bg-censys',
    urlscan:'bg-urlscan', fofa:'bg-fofa', grep:'bg-grep', intx:'bg-intx'
  };

  /* ─── BUILD URL ─── */
  function buildUrl(d, target) {
    let q = d.query.replace(/\{T\}/g, target);
    if (d.platforms.includes('google') && !q.startsWith('http')) {
      return 'https://www.google.com/search?q=' + esc(q);
    }
    return q; // already a full URL
  }

  /* ─── RENDER ─── */
  function render() {
    const container = $('dorksContainer');
    const ft = filterText.toLowerCase();
    let html = '';
    let totalVisible = 0;
    let statParts = [];

    for (const sev of SEV_ORDER) {
      if (!activeSevs.has(sev)) continue;
      const dorks = DORKS[sev];
      const filtered = dorks.filter(d =>
        !ft ||
        d.title.toLowerCase().includes(ft) ||
        d.query.toLowerCase().includes(ft)
      );
      if (filtered.length === 0) continue;
      totalVisible += filtered.length;
      statParts.push({ sev, count: filtered.length });

      html += `<div class="sev-section" data-sev="${sev}">
        <div class="sev-head">
          <span class="sev-dot ${SEV_DOT[sev]}"></span>
          <h2 class="${SEV_COL[sev]}">${SEV_LABEL[sev]}</h2>
          <span class="sev-count">${filtered.length} dork${filtered.length!==1?'s':''}</span>
        </div>
        <div class="dork-grid">`;

      for (const d of filtered) {
        const q = d.query.replace(/\{T\}/g, currentTarget);
        const url = buildUrl(d, currentTarget);
        const badges = d.platforms.map(p =>
          `<span class="badge ${BADGE_CLASS[p]||'bg-google'}">${p}</span>`
        ).join('');
        html += `
          <a href="${url}" target="_blank" rel="noopener" class="dork-card">
            <div class="dork-title">
              <span class="dork-icon">${d.icon}</span>
              ${d.title}
            </div>
            <div class="dork-query">${q}</div>
            <div class="dork-footer">
              ${badges}
              <button class="copy-btn" data-query="${encodeURIComponent(q)}" title="Copy query">copy</button>
            </div>
          </a>`;
      }
      html += `</div></div>`;
    }

    container.innerHTML = html;

    // Stats
    const ss = $('statsStrip');
    ss.innerHTML = `
      <div class="stat-box">🎯 Target: <strong>${currentTarget}</strong></div>
      <div class="stat-box">📦 Showing: <strong>${totalVisible}</strong> dorks</div>
      ${statParts.map(s => `<div class="stat-box"><span class="${SEV_COL[s.sev]}">${SEV_LABEL[s.sev]}:</span> <strong>${s.count}</strong></div>`).join('')}
    `;

    // Copy buttons — stop link navigation
    container.querySelectorAll('.copy-btn').forEach(btn => {
      btn.addEventListener('click', e => {
        e.preventDefault();
        e.stopPropagation();
        const q = decodeURIComponent(btn.dataset.query);
        navigator.clipboard.writeText(q).then(() => {
          btn.textContent = '✓ copied';
          btn.classList.add('copied');
          setTimeout(() => { btn.textContent = 'copy'; btn.classList.remove('copied'); }, 1500);
        });
      });
    });
  }

      <a href="https://securityheaders.com/?q=${esc(t)}&followRedirects=on" target="_blank">🛡️ Sec Headers</a>
      <a href="https://intelx.io/?s=${esc(t)}" target="_blank">🕶️ IntelX</a>
      <a href="https://www.openbugbounty.org/search/?search=${esc(t)}" target="_blank">🐞 OpenBugBounty</a>
      <a href="https://publicwww.com/websites/%22${esc(t)}%22/" target="_blank">📄 PublicWWW</a>
      <a href="https://dnsdumpster.com/" target="_blank" title="Paste ${t} on the site">🗺️ DNSDumpster</a>
    `;
  }

  /* ─── SEVERITY FILTER ─── */
  const sevFilter = $('sevFilter');
  sevFilter.querySelectorAll('.sev-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const s = btn.dataset.sev;
      if (s === 'all') {
        const allOn = activeSevs.size === SEV_ORDER.length;
        if (allOn) {
          activeSevs.clear();
        } else {
          SEV_ORDER.forEach(x => activeSevs.add(x));
        }
      } else {
        if (activeSevs.has(s)) activeSevs.delete(s);
        else activeSevs.add(s);
      }
      // update button states
      sevFilter.querySelectorAll('.sev-btn').forEach(b => {
        const bs = b.dataset.sev;
        if (bs === 'all') {
          b.classList.toggle('active', activeSevs.size === SEV_ORDER.length);
        } else {
          b.classList.toggle('active', activeSevs.has(bs));
        }
      });
      render();
    });
  });

  /* ─── FILTER INPUT ─── */
  $('filterInput').addEventListener('input', e => {
    filterText = e.target.value.trim();
    render();
  });

  /* ─── APPLY BUTTON ─── */
  function applyTarget() {
    const val = sanitize($('targetDomain').value);
    currentTarget = val;
    $('targetDomain').value = val;
    render();
    renderQuick(val);
  }
  $('applyBtn').addEventListener('click', applyTarget);
  $('targetDomain').addEventListener('keypress', e => { if (e.key === 'Enter') applyTarget(); });

  /* ─── INIT ─── */
  render();
  renderQuick(currentTarget);
})();
</script>
</body>
</html>
